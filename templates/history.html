<head>
    <title>History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>📜 Transcription History</h1>

    <button onclick="goBack()">⬅ Back</button>
    <button onclick="clearHistory()">🗑 Clear History</button>

    <!-- 🔥 THIS WAS MISSING OR WRONG -->
    <div id="historyContainer"></div>

</div>


<script>
async function loadHistory() {
    console.log("🔥 Loading history...");

    const response = await fetch('/history');
    const data = await response.json();

    console.log("DATA:", data);  // 👈 SEE THIS IN CONSOLE

    const container = document.getElementById('historyContainer');

    if (!container) {
        console.log("❌ historyContainer NOT FOUND");
        return;
    }

    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = "<p>No history found 📭</p>";
        return;
    }

    data.forEach(item => {
        const div = document.createElement('div');
        div.className = "history-card";
        div.innerText = item[0];
        container.appendChild(div);
    });
}

function goBack() {
    window.location.href = "/dashboard";
}

async function clearHistory() {
    const confirmDelete = confirm("Are you sure?");
    if (!confirmDelete) return;

    await fetch('/clear-history', { method: 'POST' });

    document.getElementById('historyContainer').innerHTML = "<p>Cleared ✅</p>";

    loadHistory();
}

/* ✅ ONLY ONE CALL */
window.onload = loadHistory;
</script>
